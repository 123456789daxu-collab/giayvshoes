spring.application.name=BE
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=VSHOES;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# IMPORTANT: ddl-auto=none to prevent Hibernate from altering existing SQL Server columns with default constraints
spring.jpa.hibernate.ddl-auto=none
spring.jpa.generate-ddl=false
spring.jpa.properties.hibernate.hbm2ddl.auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true

# Cau hinh kich thuoc toi da cho file upload (anh san pham) - 100MB
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.enabled=true
server.tomcat.max-swallow-size=104857600
# Tat Cache Thymeleaf de code khong bi luu bo nho tam
spring.thymeleaf.cache=false

# Email Configuration (To be filled by user with App Password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true