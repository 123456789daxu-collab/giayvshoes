spring.application.name=BE
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=VSHOES;encrypt=true;trustServerCertificate=true;sendStringParametersAsUnicode=true;characterEncoding=UTF-8
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true

# Cau hinh kich thuoc toi da cho file upload (anh san pham) - 100MB
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.enabled=true
server.tomcat.max-swallow-size=104857600
# Tat Cache Thymeleaf de code khong bi luu bo nho tam
spring.thymeleaf.cache=false
