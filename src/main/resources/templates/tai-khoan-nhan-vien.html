<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài khoản nhân viên | VShoes</title>
    
    <!-- 1. CSS Stylesheets -->
    <link rel="stylesheet" href="/css/sidebar.css">
    <link rel="stylesheet" href="/css/store.css">
    <link rel="stylesheet" href="/css/employee.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
            margin: 0;
        }
        
        .modal-body-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 600px) {
            .modal-body-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Nhúng Sidebar dùng chung -->
        <div th:replace="~{sidebar/sidebar :: sidebar}"></div>

        <!-- Nội dung chính -->
        <main class="main-content" style="padding: 20px; background: #f8f9fa;">
            <!-- Bộ lọc tìm kiếm Card -->
            <div class="content-card" style="background: white; border-radius: 4px; padding: 20px; margin-bottom: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
                <div class="filter-grid" style="display: grid; grid-template-columns: 2fr 1fr 2fr 1.5fr auto; gap: 20px; align-items: end;">
                    <!-- Keyword -->
                    <div>
                        <label style="display: block; font-size: 12px; color: #666; margin-bottom: 8px;">Họ và tên, sđt, email</label>
                        <input type="text" id="searchInput" placeholder="Nhập họ và tên, sđt, email" style="width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 13px; box-sizing: border-box; outline: none;">
                    </div>
                    
                    <!-- Gender -->
                    <div>
                        <label style="display: block; font-size: 12px; color: #666; margin-bottom: 8px;">Giới tính</label>
                        <div style="display: flex; gap: 15px; font-size: 13px; padding-bottom: 8px;">
                            <label style="display: flex; align-items: center; gap: 5px; color: #444;"><input type="radio" name="filterGender" value="true"> Nam</label>
                            <label style="display: flex; align-items: center; gap: 5px; color: #444;"><input type="radio" name="filterGender" value="false"> Nữ</label>
                        </div>
                    </div>
                    
                    <!-- DOB -->
                    <div>
                        <label style="display: block; font-size: 12px; color: #666; margin-bottom: 8px;">Ngày sinh</label>
                        <input type="date" id="filterDob" style="width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 13px; box-sizing: border-box; outline: none; color: #666;">
                    </div>
                    
                    <!-- Status -->
                    <div>
                        <label style="display: block; font-size: 12px; color: #666; margin-bottom: 8px;">Trạng thái</label>
                        <div style="display: flex; gap: 15px; font-size: 13px; padding-bottom: 8px;">
                            <label style="display: flex; align-items: center; gap: 5px; color: #444;"><input type="radio" name="filterStatus" value="1"> Hoạt động</label>
                            <label style="display: flex; align-items: center; gap: 5px; color: #444;"><input type="radio" name="filterStatus" value="0"> Ngưng hoạt động</label>
                        </div>
                    </div>
                    
                    <!-- Refresh Button -->
                    <div>
                        <button onclick="location.reload()" style="background: linear-gradient(135deg, #7c3aed 0%, #2563eb 100%); color: white; border: none; border-radius: 8px; width: 60px; height: 35px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(124, 58, 237, 0.2);"><i data-lucide="refresh-cw" style="width: 16px; height: 16px;"></i></button>
                    </div>
                </div>
            </div>

            <!-- Danh sách nhân viên Card -->
            <div class="content-card" style="background: white; border-radius: 4px; padding: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3 style="font-size: 15px; margin: 0; color: #333; font-weight: 700;">Danh sách nhân viên</h3>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn-brown-icon" title="Tải lên"><i data-lucide="upload"></i></button>
                        <button class="btn-brown-icon" title="Tải xuống"><i data-lucide="download"></i></button>
                        <button class="btn-brown-icon" title="Xuất file"><i data-lucide="file-text"></i></button>
                        <button class="btn-brown-icon" id="btnAddEmployee" title="Thêm Nhân viên"><i data-lucide="plus"></i></button>
                    </div>
                </div>
                
                <!-- Table -->
                <div style="overflow-x: auto;">
                    <table class="brown-table" style="width: 100%; border-collapse: collapse; font-size: 13px; text-align: center;">
                        <thead>
                            <tr style="background: #fafafa; border-bottom: 1px solid #f0f0f0;">
                                <th style="padding: 12px 10px; font-weight: 600; color: #333; border: 1px solid #f0f0f0;">STT</th>
                                <th style="padding: 12px 10px; font-weight: 600; color: #333; border: 1px solid #f0f0f0; width: 60px;">Ảnh</th>
                                <th style="padding: 12px 10px; font-weight: 600; color: #333; border: 1px solid #f0f0f0;">Họ và tên</th>
                                <th style="padding: 12px 10px; font-weight: 600; color: #333; border: 1px solid #f0f0f0;">Vai trò</th>
                                <th style="padding: 12px 10px; font-weight: 600; color: #333; border: 1px solid #f0f0f0;">Giới tính</th>
                                <th style="padding: 12px 10px; font-weight: 600; color: #333; border: 1px solid #f0f0f0;">Ngày sinh</th>
                                <th style="padding: 12px 10px; font-weight: 600; color: #333; border: 1px solid #f0f0f0;">Liên hệ</th>
                                <th style="padding: 12px 10px; font-weight: 600; color: #333; text-align: left; border: 1px solid #f0f0f0;">Địa chỉ</th>
                                <th style="padding: 12px 10px; font-weight: 600; color: #333; border: 1px solid #f0f0f0;">Trạng thái</th>
                                <th style="padding: 12px 10px; font-weight: 600; color: #333; border: 1px solid #f0f0f0; width: 100px;">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="employeeTableBody">
                            <!-- dynamic rows -->
                        </tbody>
                    </table>
                </div>

                <!-- Pagination Container -->
                <div class="pagination-wrapper" id="paginationWrapper" style="display: none;">
                    <div class="pagination-info" id="paginationInfo" style="display: none;">Hiển thị...</div>
                    <div class="pagination-controls" id="paginationControls"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- ADD/EDIT MODAL -->
    <div class="modal-overlay" id="employeeModal">
        <div class="modal-glass-content" style="max-width: 750px; width: 95%;">
            <span class="close" id="modalClose" style="position: absolute; top: 20px; right: 25px; cursor: pointer; font-size: 28px; color: #64748b; font-weight: 500;">&times;</span>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h2 id="modalTitle" class="gradient-text" style="font-size: 22px; margin: 0; font-weight: 800;">Thêm Nhân viên</h2>
                <button type="button" class="btn-premium" id="btnScanCCCD" style="font-size: 13px; padding: 6px 15px; background: linear-gradient(135deg, #10b981 0%, #059669 100%);"><i data-lucide="scan" style="width: 14px; height: 14px; margin-right: 5px; vertical-align: text-bottom;"></i> Quét CCCD</button>
            </div>

            <!-- Scanner Container (Hidden by default) -->
            <div id="qrReaderContainer" style="display: none; margin-bottom: 20px; text-align: center; border: 2px dashed #cbd5e1; border-radius: 8px; overflow: hidden; position: relative;">
                <div id="qr-reader" style="width: 100%;"></div>
                <button type="button" id="btnCancelScan" style="position: absolute; top: 10px; right: 10px; z-index: 10; background: rgba(0,0,0,0.5); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer;">Đóng máy quét</button>
            </div>

            <form id="employeeForm">
                <!-- Hidden Employee ID -->
                <input type="hidden" id="empId">
                
                <div class="modal-body-grid">
                    <!-- Name field -->
                    <div>
                        <label style="font-size: 13px; font-weight: 700; color: #475569; display: block; margin-bottom: 8px;">Họ &amp; Tên nhân viên <span style="color: #ef4444;">*</span></label>
                        <input type="text" class="glass-input" id="empName" placeholder="Nhập họ và tên..." required style="width: 100%; box-sizing: border-box;"/>
                    </div>
                    
                    <!-- Email field -->
                    <div>
                        <label style="font-size: 13px; font-weight: 700; color: #475569; display: block; margin-bottom: 8px;">Địa chỉ Email <span style="color: #ef4444;">*</span></label>
                        <input type="email" class="glass-input" id="empEmail" placeholder="example@gmail.com" required style="width: 100%; box-sizing: border-box;"/>
                    </div>

                    <!-- Phone field -->
                    <div>
                        <label style="font-size: 13px; font-weight: 700; color: #475569; display: block; margin-bottom: 8px;">Số điện thoại <span style="color: #ef4444;">*</span></label>
                        <input type="text" class="glass-input" id="empPhone" placeholder="Nhập số điện thoại..." required style="width: 100%; box-sizing: border-box;"/>
                    </div>

                    <!-- Password field -->
                    <div>
                        <label style="font-size: 13px; font-weight: 700; color: #475569; display: block; margin-bottom: 8px;">Mật khẩu truy cập <span style="color: #ef4444;">*</span></label>
                        <input type="password" class="glass-input" id="empPassword" placeholder="Nhập mật khẩu..." required style="width: 100%; box-sizing: border-box;"/>
                    </div>

                    <!-- Gender field (Radio Group) -->
                    <div>
                        <label style="font-size: 13px; font-weight: 700; color: #475569; display: block; margin-bottom: 8px;">Giới tính</label>
                        <div class="gender-radio-group">
                            <label class="gender-option">
                                <input type="radio" name="empGender" id="genderMale" checked value="true">
                                Nam
                            </label>
                            <label class="gender-option">
                                <input type="radio" name="empGender" id="genderFemale" value="false">
                                Nữ
                            </label>
                        </div>
                    </div>

                    <!-- Birth Date field -->
                    <div>
                        <label style="font-size: 13px; font-weight: 700; color: #475569; display: block; margin-bottom: 8px;">Ngày sinh</label>
                        <input type="date" class="glass-input" id="empDob" style="width: 100%; box-sizing: border-box;"/>
                    </div>

                    <!-- Role selector -->
                    <div>
                        <label style="font-size: 13px; font-weight: 700; color: #475569; display: block; margin-bottom: 8px;">Chức vụ</label>
                        <select class="glass-input" id="empRole" style="width: 100%; box-sizing: border-box;">
                            <option value="Quản trị viên">Quản trị viên</option>
                            <option value="Nhân viên bán hàng">Nhân viên bán hàng</option>
                        </select>
                    </div>

                    <!-- Status selector -->
                    <div>
                        <label style="font-size: 13px; font-weight: 700; color: #475569; display: block; margin-bottom: 8px;">Trạng thái hoạt động</label>
                        <select class="glass-input" id="empStatus" style="width: 100%; box-sizing: border-box;">
                            <option value="1">Đang làm việc</option>
                            <option value="0">Đã nghỉ việc</option>
                        </select>
                    </div>
                </div>

                <!-- Custom Drag and Drop Avatar area -->
                <div style="margin-top: 20px;">
                    <label style="font-size: 13px; font-weight: 700; color: #475569; display: block; margin-bottom: 8px;">Ảnh đại diện</label>
                    <div class="avatar-upload-container" id="avatarDropZone">
                        <div class="avatar-preview-box">
                            <img id="empAvatarImg" src="/images/avatars/default.png" alt="Avatar preview" onerror="this.src='/images/avatars/default.png'"/>
                        </div>
                        <div class="upload-actions">
                            <span class="btn-upload-trigger"><i data-lucide="upload-cloud" style="width: 14px; height: 14px; vertical-align: middle; margin-right: 4px;"></i> Tải ảnh lên</span>
                            <span class="upload-tip">Nhấp hoặc kéo thả tệp tin ảnh vào vùng này (Tối đa 3MB)</span>
                            <input type="file" id="empAvatar" accept="image/*" style="display: none;"/>
                        </div>
                    </div>
                </div>

                <!-- Residence Address field -->
                <div style="margin-top: 20px;">
                    <label style="font-size: 13px; font-weight: 700; color: #475569; display: block; margin-bottom: 8px;">Địa chỉ thường trú</label>
                    <textarea class="glass-input" id="empAddress" rows="2" placeholder="Nhập địa chỉ thường trú..." style="width: 100%; resize: none; box-sizing: border-box;"></textarea>
                </div>

                <!-- Submit / Cancel Controls -->
                <div style="margin-top: 30px; display: flex; justify-content: flex-end; gap: 10px;">
                    <button type="button" class="btn-premium-secondary" id="btnCancel">Hủy</button>
                    <button type="submit" class="btn-premium" style="min-width: 120px;">Lưu thông tin</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 2. Javascript Imports -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="/js/employee.js" defer></script>
</body>
</html>
