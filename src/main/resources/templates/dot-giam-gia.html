<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đợt giảm giá | VShoes</title>
    <!-- Nhúng CSS sidebar & khách hàng dùng chung -->
    <link rel="stylesheet" href="/css/sidebar.css">
    <link rel="stylesheet" href="/css/khach-hang.css">
    <!-- Nhúng CSS riêng của trang đợt giảm giá -->
    <link rel="stylesheet" href="/css/dot-giam-gia.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="app-container">
        <!-- Nhúng Sidebar dùng chung -->
        <div th:replace="~{sidebar/sidebar :: sidebar}"></div>

        <!-- NỘI DUNG CHÍNH -->
        <main class="main-content">
            <div class="campaign-container">

                <!-- PANEL 1: DANH SÁCH ĐỢT GIẢM GIÁ (LISTING PANEL) -->
                <div id="list-panel" class="tab-panel active">
                    
                    <!-- BỘ LỌC TÌM KIẾM -->
                    <h3 style="font-size: 15px; margin: 0 0 20px 0; color: #333; font-weight: 700;">Bộ lọc tìm kiếm</h3>
                        
                        <div class="filter-grid" style="display: grid; grid-template-columns: 2fr 2fr 1fr 1fr auto; gap: 15px; align-items: end; margin-bottom: 24px;">
                            <!-- Tìm kiếm theo mã hoặc tên -->
                            <div>
                                <label style="display: block; font-size: 12px; color: #666; margin-bottom: 8px;">Tìm kiếm</label>
                                <div style="position: relative;">
                                    <i data-lucide="search" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: #94a3b8;"></i>
                                    <input type="text" id="filter-search" placeholder="Nhập tên hoặc mã đợt giảm giá..." style="width: 100%; padding: 8px 12px 8px 32px; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 13px; box-sizing: border-box; outline: none;" oninput="applyCampaignFilters()">
                                </div>
                            </div>

                            <!-- Khoảng ngày áp dụng -->
                            <div>
                                <label style="display: block; font-size: 12px; color: #666; margin-bottom: 8px;">Khoảng ngày áp dụng</label>
                                <div style="display: flex; gap: 10px; align-items: center;">
                                    <input type="date" id="filter-start-date" style="width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 13px; box-sizing: border-box; outline: none; color: #666;" onchange="applyCampaignFilters()">
                                    <span style="color: #94a3b8; font-size: 12px;">&rarr;</span>
                                    <input type="date" id="filter-end-date" style="width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 13px; box-sizing: border-box; outline: none; color: #666;" onchange="applyCampaignFilters()">
                                </div>
                            </div>
                            
                            <!-- Hình thức (Đã xóa) -->

                            <!-- Trạng thái -->
                            <div>
                                <label style="display: block; font-size: 12px; color: #666; margin-bottom: 8px;">Trạng thái</label>
                                <select id="filter-status" style="width: 100%; padding: 8px 12px; border: 1px solid #e2e8f0; border-radius: 4px; font-size: 13px; box-sizing: border-box; outline: none; color: #444; background-color: white;" onchange="applyCampaignFilters()">
                                    <option value="">Tất cả</option>
                                    <option value="1">Diễn ra</option>
                                    <option value="3">Sắp diễn ra</option>
                                    <option value="2">Hết hạn</option>
                                </select>
                            </div>
                            
                            <!-- Nút làm mới -->
                            <div>
                                <button onclick="resetCampaignFilters()" style="background: linear-gradient(135deg, #7c3aed 0%, #2563eb 100%); color: white; border: none; border-radius: 8px; width: 35px; height: 35px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(124, 58, 237, 0.2); transition: transform 0.2s;"><i data-lucide="refresh-cw" style="width: 16px; height: 16px;"></i></button>
                            </div>
                        </div>

                    <!-- CARD DANH SÁCH -->
                    <div class="customer-card">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                            <span class="card-title-table" style="margin-bottom: 0;">Danh sách đợt giảm giá</span>
                            <div style="display: flex; gap: 8px;">
                                <button id="btnExportExcel" onclick="exportCampaignsExcel()" style="padding: 8px 14px; background: white; color: #2563eb; border: 1px solid #2563eb; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-weight: 500; font-size: 13px; transition: all 0.2s;" onmouseover="this.style.background='#2563eb'; this.style.color='white'" onmouseout="this.style.background='white'; this.style.color='#2563eb'">
                                    <i data-lucide="file-spreadsheet" style="width: 16px; height: 16px;"></i> Xuất Excel
                                </button>
                                <button onclick="openAddCampaignForm()" style="padding: 8px 14px; background: linear-gradient(135deg, #7c3aed 0%, #2563eb 100%); color: white; border: none; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-weight: 500; font-size: 13px; box-shadow: 0 4px 10px rgba(124, 58, 237, 0.2); width: auto;">
                                    <i data-lucide="plus" style="width: 16px; height: 16px;"></i> Tạo đợt giảm giá
                                </button>
                            </div>
                        </div>

                        <!-- Bảng danh sách đợt giảm giá -->
                        <div class="custom-table-container">
                            <table class="customer-table">
                                <thead>
                                    <tr>
                                        <th style="width: 50px; text-align: center;">STT</th>
                                        <th style="width: 100px;">Mã</th>
                                        <th style="width: 180px;">Tên</th>
                                        <th style="width: 120px; text-align: center;">Mức giảm (%)</th>
                                        <th style="width: 160px;">Thời gian bắt đầu</th>
                                        <th style="width: 160px;">Thời gian kết thúc</th>
                                        <th style="width: 130px;">Trạng thái</th>
                                        <th style="width: 120px; text-align: center;">Hành động</th>
                                    </tr>
                                </thead>
                                <tbody id="campaign-table-body">
                                    <!-- Load động từ JS -->
                                </tbody>
                            </table>
                        </div>

                        <!-- Phân trang danh sách -->
                        <div class="table-footer">
                            <div class="total-count" id="campaign-total-count" style="display: none;">
                                Tổng 0 đợt giảm giá
                            </div>
                            <div class="pagination-nav" id="campaign-pagination">
                                <!-- Nút trang -->
                            </div>
                            <div class="page-size-selector">
                                <select class="page-size-select" id="campaign-page-size" onchange="changeCampaignPageSize(this.value)">
                                    <option value="10">10</option>
                                    <option value="20">20</option>
                                    <option value="50">50</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- PANEL 2: THÊM MỚI / CẬP NHẬT ĐỢT GIẢM GIÁ (FORM PANEL) -->
                <div id="form-panel" class="tab-panel">
                    
                    <button class="back-link" onclick="backToListPanel()">
                        <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i>
                        Quay lại danh sách
                    </button>

                    <div class="form-card">
                        <div class="form-title-row">
                            <span id="form-panel-title" class="form-title">Tạo đợt giảm giá</span>
                        </div>

                        <form id="campaign-form" onsubmit="saveCampaign(event)">
                            <input type="hidden" id="campaign-id">

                            <!-- SPLIT LAYOUT -->
                            <div style="display: flex; gap: 40px; align-items: stretch; margin-top: 10px;">
                                
                                <!-- CỘT TRÁI: FORM -->
                                <div style="flex: 1; max-width: 480px; display: flex; flex-direction: column; gap: 20px;">
                                    <div class="form-group" style="margin-bottom: 0; display: none;">
                                        <label for="campaign-code">Mã đợt giảm giá:</label>
                                        <input type="text" id="campaign-code" class="input-control" placeholder="Hệ thống tự sinh">
                                    </div>

                                    <div class="form-group" style="margin-bottom: 0;">
                                        <label for="campaign-name">Tên đợt giảm giá: <span class="required-star">*</span></label>
                                        <input type="text" id="campaign-name" class="input-control" required placeholder="Nhập tên đợt giảm giá...">
                                    </div>

                                    <div style="display: flex; gap: 20px; align-items: center;">
                                        <div class="form-group" style="margin-bottom: 0; flex: 1;">
                                            <label for="campaign-discount-value">Mức giảm (%): <span class="required-star">*</span></label>
                                            <input type="number" id="campaign-discount-value" class="input-control" placeholder="Nhập phần trăm giảm (1-100)..." min="1" max="100" required>
                                            <input type="hidden" name="discount-type" value="%">
                                        </div>
                                    </div>

                                    <div style="display: flex; gap: 16px;">
                                        <div class="form-group" style="margin-bottom: 0; flex: 1;">
                                            <label for="campaign-start-date">Ngày bắt đầu: <span class="required-star">*</span></label>
                                            <input type="datetime-local" id="campaign-start-date" class="input-control" required>
                                        </div>
                                        <div class="form-group" style="margin-bottom: 0; flex: 1;">
                                            <label for="campaign-end-date">Ngày kết thúc: <span class="required-star">*</span></label>
                                            <input type="datetime-local" id="campaign-end-date" class="input-control" required>
                                        </div>
                                    </div>

                                    <textarea id="campaign-desc" style="display: none;"></textarea>

                                    <div style="margin-top: 16px; display: flex; gap: 12px;">
                                        <button type="submit" class="btn-primary-action" style="padding: 10px 30px; border-radius: 6px; background: #3b82f6; border: none; font-weight: 600; color: white; cursor: pointer; transition: background 0.2s;" onmouseover="this.style.background='#2563eb'" onmouseout="this.style.background='#3b82f6'">Tạo mới</button>
                                        <button type="button" class="btn-secondary" onclick="backToListPanel()">Hủy</button>
                                    </div>
                                </div>

                                <!-- CỘT PHẢI: TÌM KIẾM VÀ BẢNG -->
                                <div style="flex: 2; display: flex; flex-direction: column; background: #fff; border: 1px solid #f1f5f9; border-radius: 8px; padding: 20px;">
                                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                                        <div style="font-size: 14px; font-weight: 500; color: #64748b;">
                                            Đã chọn: <span id="prod-selected-label" style="color: #2563eb; font-weight: 700;">0</span> chi tiết sản phẩm
                                        </div>
                                        <div style="position: relative; width: 300px;">
                                            <input type="text" id="prod-filter-search" class="input-control" placeholder="Tìm theo tên..." oninput="applyProdFilters()" style="padding-right: 36px; border-radius: 6px;">
                                            <i data-lucide="search" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: #94a3b8;"></i>
                                        </div>
                                    </div>

                                    <div class="table-scrollable" style="flex: 1; border: 1px solid #e2e8f0; border-radius: 6px; overflow: hidden;">
                                        <table class="customer-table" style="width: 100%; border-collapse: collapse;">
                                            <thead style="background: #f8fafc; border-bottom: 1px solid #e2e8f0;">
                                                <tr>
                                                    <th class="checkbox-cell" style="padding: 12px; text-align: center; width: 60px;">
                                                        <input type="checkbox" id="check-all-products" onchange="toggleSelectAllPage(this.checked)">
                                                    </th>
                                                    <th style="padding: 12px; font-weight: 600; text-align: left; color: #1e293b;">Mã SPCT</th>
                                                    <th style="padding: 12px; font-weight: 600; text-align: left; color: #1e293b;">Sản phẩm</th>
                                                    <th style="padding: 12px; font-weight: 600; text-align: left; color: #1e293b;">Màu sắc</th>
                                                    <th style="padding: 12px; font-weight: 600; text-align: left; color: #1e293b;">Size</th>
                                                    <th style="padding: 12px; font-weight: 600; text-align: left; color: #1e293b;">Giá bán</th>
                                                </tr>
                                            </thead>
                                            <tbody id="prod-table-body" style="background: white;">
                                                <!-- Load động -->
                                            </tbody>
                                        </table>
                                    </div>

                                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 24px;">
                                        <div class="total-count" id="prod-total-count" style="font-size: 13px; color: #64748b;">
                                            Tổng 0 sản phẩm
                                        </div>
                                        <div class="pagination-nav" id="prod-pagination" style="display: flex; gap: 8px; align-items: center;"></div>
                                        <select class="page-size-select" id="prod-page-size" style="display: none;">
                                            <option value="5" selected>5</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Script Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // CÁC BIẾN TOÀN CỤC CHO CAMPAIGNS LIST
        let cCurrentPage = 0;
        let cPageSize = 10;
        let cTotalPages = 1;

        // CÁC BIẾN TOÀN CỤC CHO SẢN PHẨM SELECTION
        let prodCurrentPage = 0;
        let prodPageSize = 5;
        let prodTotalPages = 1;
        let prodTotalElements = 0;
        let selectedProductDetailIds = new Set(); // Chứa danh sách ID sản phẩm chi tiết đã chọn
        let displayedProductsOnPage = []; // Chứa danh sách sản phẩm hiển thị trên trang hiện tại

        // Khởi chạy khi DOM load xong
        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
            loadCampaignsTable();
        });

        // Hàm format Date sang yyyy-MM-ddThh:mm
        function formatDateTimeLocal(date) {
            const yyyy = date.getFullYear();
            const MM = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            const hh = String(date.getHours()).padStart(2, '0');
            const mm = String(date.getMinutes()).padStart(2, '0');
            return `${yyyy}-${MM}-${dd}T${hh}:${mm}`;
        }

        // =========================================================================
        // SECTION 1: XỬ LÝ DANH SÁCH ĐỢT GIẢM GIÁ (CAMPAIGN LIST OPERATIONS)
        // =========================================================================

        // Tải dữ liệu đợt giảm giá từ API
        async function loadCampaignsTable() {
            const search = document.getElementById("filter-search").value;
            const start = document.getElementById("filter-start-date").value;
            const end = document.getElementById("filter-end-date").value;
            const status = document.getElementById("filter-status").value;

            let url = `/api/dot-giam-gia?page=${cCurrentPage}&size=${cPageSize}`;
            if (search) url += `&search=${encodeURIComponent(search)}`;
            if (status) url += `&trangThai=${status}`;
            if (start) url += `&ngayBatDau=${encodeURIComponent(start + "T00:00:00")}`;
            if (end) url += `&ngayKetThuc=${encodeURIComponent(end + "T23:59:59")}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Không thể tải danh sách đợt giảm giá");
                const data = await response.json();
                renderCampaignsTable(data);
            } catch (err) {
                console.error(err);
                Swal.fire('Lỗi', 'Lỗi kết nối API: ' + err.message, 'error');
            }
        }

        // Render dữ liệu đợt giảm giá vào bảng
        function renderCampaignsTable(pageData) {
            const tbody = document.getElementById("campaign-table-body");
            tbody.innerHTML = "";

            const list = pageData.content || [];
            cTotalPages = pageData.totalPages || 1;
            const totalElements = pageData.totalElements || 0;

            document.getElementById("campaign-total-count").innerText = `Tổng ${totalElements} đợt giảm giá`;

            if (list.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" style="text-align: center; color: #94a3b8; padding: 48px 16px;">
                            <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                                <i data-lucide="inbox" style="width: 32px; height: 32px; color: #cbd5e1;"></i>
                                <span>Không tìm thấy đợt giảm giá nào.</span>
                            </div>
                        </td>
                    </tr>
                `;
                renderCampaignPagination();
                lucide.createIcons();
                return;
            }

            list.forEach((campaign, index) => {
                const tr = document.createElement("tr");

                // STT
                const sttTd = `<td style="text-align: center; font-weight: 500; color: #64748b;">${cCurrentPage * cPageSize + index + 1}</td>`;
                
                // Mã & Tên
                const maTd = `<td style="font-weight: 600; color: #0f172a;">${campaign.maDotGiamGia}</td>`;
                const tenTd = `<td><div style="max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${campaign.tenDotGiamGia}">${campaign.tenDotGiamGia}</div></td>`;

                // Mức giảm %
                let textValGiam = (campaign.phanTramGiam || campaign.giaTriGiam || 0) + "%";
                const giamTd = `<td style="text-align: center; font-weight: 600; color: #dc2626;">${textValGiam}</td>`;

                // Thời gian áp dụng
                const thoiGianBatDauTd = `<td>${formatDateTimeStr(campaign.ngayBatDau)}</td>`;
                const thoiGianKetThucTd = `<td>${formatDateTimeStr(campaign.ngayKetThuc)}</td>`;

                // Trạng thái thực tế
                const statusInfo = getCampaignStatus(campaign);
                const trangThaiTd = `<td><span class="badge ${statusInfo.class}">${statusInfo.text}</span></td>`;

                // Hành động
                const hanhDongTd = `
                    <td style="text-align: center;">
                        <div class="btn-actions-cell" style="justify-content: center; gap: 12px;">
                            <button type="button" class="action-icon-btn edit" title="Xem chi tiết" onclick="openEditCampaignForm(${campaign.id})">
                                <i data-lucide="eye" style="width: 14px; height: 14px;"></i>
                            </button>
                            <button type="button" class="action-icon-btn edit" style="color: #ef4444;" title="Xóa" onclick="deleteCampaign(${campaign.id})">
                                <i data-lucide="trash-2" style="width: 14px; height: 14px;"></i>
                            </button>
                        </div>
                    </td>
                `;

                tr.innerHTML = sttTd + maTd + tenTd + giamTd + thoiGianBatDauTd + thoiGianKetThucTd + trangThaiTd + hanhDongTd;
                tbody.appendChild(tr);
            });

            renderCampaignPagination();
            lucide.createIcons();
        }

        // Tính trạng thái đợt giảm giá
        function getCampaignStatus(campaign) {
            const now = new Date();
            const start = new Date(campaign.ngayBatDau);
            const end = new Date(campaign.ngayKetThuc);

            if (campaign.trangThai === 0 || now > end) {
                return { text: "Hết hạn", class: "badge-inactive" };
            } else if (now < start) {
                return { text: "Sắp diễn ra", class: "badge-pending" };
            } else {
                return { text: "Diễn ra", class: "badge-active" };
            }
        }

        // Định dạng tiền tệ VND
        function formatCurrency(val) {
            if (val === null || val === undefined) return "0";
            return new Intl.NumberFormat('vi-VN').format(val);
        }

        // Định dạng datetime JSON thành dd/MM/yyyy HH:mm:ss
        function formatDateTimeStr(dateArr) {
            if (!dateArr) return "-";
            if (Array.isArray(dateArr)) {
                const yyyy = dateArr[0];
                const MM = String(dateArr[1]).padStart(2, '0');
                const dd = String(dateArr[2]).padStart(2, '0');
                const hh = String(dateArr[3] || 0).padStart(2, '0');
                const mm = String(dateArr[4] || 0).padStart(2, '0');
                const ss = String(dateArr[5] || 0).padStart(2, '0');
                return `${dd}/${MM}/${yyyy} ${hh}:${mm}:${ss}`;
            }
            const date = new Date(dateArr);
            if (isNaN(date.getTime())) return dateArr;
            const dd = String(date.getDate()).padStart(2, '0');
            const MM = String(date.getMonth() + 1).padStart(2, '0');
            const yyyy = date.getFullYear();
            const hh = String(date.getHours()).padStart(2, '0');
            const mm = String(date.getMinutes()).padStart(2, '0');
            const ss = String(date.getSeconds()).padStart(2, '0');
            return `${dd}/${MM}/${yyyy} ${hh}:${mm}:${ss}`;
        }

        // Vẽ phân trang đợt giảm giá
        function renderCampaignPagination() {
            const nav = document.getElementById("campaign-pagination");
            nav.innerHTML = "";

            // Nút lùi
            const prev = document.createElement("button");
            prev.className = `page-btn ${cCurrentPage === 0 ? 'disabled' : ''}`;
            prev.innerHTML = `<i data-lucide="chevron-left" style="width: 16px; height: 16px;"></i>`;
            prev.onclick = () => { if (cCurrentPage > 0) { cCurrentPage--; loadCampaignsTable(); } };
            nav.appendChild(prev);

            // Các trang số
            for (let i = 0; i < cTotalPages; i++) {
                const btn = document.createElement("button");
                btn.className = `page-btn ${i === cCurrentPage ? 'active' : ''}`;
                btn.innerText = i + 1;
                btn.onclick = () => { cCurrentPage = i; loadCampaignsTable(); };
                nav.appendChild(btn);
            }

            // Nút tiến
            const next = document.createElement("button");
            next.className = `page-btn ${cCurrentPage >= cTotalPages - 1 ? 'disabled' : ''}`;
            next.innerHTML = `<i data-lucide="chevron-right" style="width: 16px; height: 16px;"></i>`;
            next.onclick = () => { if (cCurrentPage < cTotalPages - 1) { cCurrentPage++; loadCampaignsTable(); } };
            nav.appendChild(next);
        }

        function changeCampaignPageSize(val) {
            cPageSize = parseInt(val);
            cCurrentPage = 0;
            loadCampaignsTable();
        }

        function applyCampaignFilters() {
            cCurrentPage = 0;
            loadCampaignsTable();
        }

        function resetCampaignFilters() {
            document.getElementById("filter-search").value = "";
            document.getElementById("filter-start-date").value = "";
            document.getElementById("filter-end-date").value = "";
            document.getElementById("filter-status").value = "";
            cCurrentPage = 0;
            loadCampaignsTable();
        }

        // Bật/tắt trạng thái
        async function toggleCampaignActive(id, isChecked) {
            const status = isChecked ? 1 : 0;
            try {
                const response = await fetch(`/api/dot-giam-gia/${id}/trang-thai?trangThai=${status}`, {
                    method: "PATCH"
                });
                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.message || "Không thể cập nhật trạng thái");
                }
                loadCampaignsTable();
            } catch (err) {
                Swal.fire('Lỗi', err.message, 'error');
                loadCampaignsTable();
            }
        }

        async function deleteCampaign(id) {
            const result = await Swal.fire({
                title: 'Xóa đợt giảm giá?',
                text: "Bạn có chắc chắn muốn xóa đợt giảm giá này? Hành động này không thể hoàn tác!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#64748b',
                confirmButtonText: 'Đồng ý xóa',
                cancelButtonText: 'Hủy'
            });

            if (result.isConfirmed) {
                try {
                    const response = await fetch(`/api/dot-giam-gia/${id}`, {
                        method: "DELETE"
                    });
                    if (!response.ok) {
                        const data = await response.json();
                        throw new Error(data.message || "Không thể xóa");
                    }
                    Swal.fire('Đã xóa!', 'Đợt giảm giá đã được xóa thành công.', 'success');
                    loadCampaignsTable();
                } catch (err) {
                    Swal.fire('Lỗi', "Thao tác thất bại: " + err.message, 'error');
                }
            }
        }

        function exportCampaignsExcel() {
            const search = document.getElementById("filter-search").value;
            const start = document.getElementById("filter-start-date").value;
            const end = document.getElementById("filter-end-date").value;
            const status = document.getElementById("filter-status").value;

            let url = `/api/dot-giam-gia/export?`;
            if (search) url += `search=${encodeURIComponent(search)}&`;
            if (status) url += `trangThai=${status}&`;
            if (start) url += `ngayBatDau=${encodeURIComponent(start + "T00:00:00")}&`;
            if (end) url += `ngayKetThuc=${encodeURIComponent(end + "T23:59:59")}&`;

            window.location.href = url;
        }


        // =========================================================================
        // SECTION 2: XỬ LÝ BIỂU MẪU THÊM MỚI / SỬA (FORM OPERATIONS)
        // =========================================================================

        // Remove adjustNumberInput and onCampaignDiscountTypeChange

        function updateCharCount(textarea) {
            const label = document.getElementById("desc-char-count");
            label.innerText = `${textarea.value.length}/500`;
        }

        function openAddCampaignForm() {
            document.getElementById("campaign-form").reset();
            document.getElementById("campaign-id").value = "";
            document.getElementById("campaign-code").value = "";
            document.getElementById("form-panel-title").innerText = "Tạo đợt giảm giá";
            
            const descCharEl = document.getElementById("desc-char-count");
            if (descCharEl) descCharEl.innerText = "0/500";
            document.getElementById("campaign-discount-value").value = "";
            
            selectedProductDetailIds.clear();
            const prodSelectedEl = document.getElementById("prod-selected-label");
            if (prodSelectedEl) prodSelectedEl.innerText = "0";

            // Ngày mặc định: bắt đầu là hiện tại, kết thúc sau 3 ngày
            const now = new Date();
            const future = new Date();
            future.setDate(now.getDate() + 3);
            
            document.getElementById("campaign-start-date").value = formatDateTimeLocal(now);
            document.getElementById("campaign-end-date").value = formatDateTimeLocal(future);

            // Nạp bảng sản phẩm chi tiết
            prodCurrentPage = 0;
            loadProductDetailsTable();

            // Chuyển panel
            document.getElementById("list-panel").classList.remove("active");
            document.getElementById("form-panel").classList.add("active");
            
            window.scrollTo(0, 0);
            lucide.createIcons();
        }

        async function openEditCampaignForm(id) {
            try {
                const resCampaign = await fetch(`/api/dot-giam-gia/${id}`);
                if (!resCampaign.ok) throw new Error("Không thể tải thông tin đợt giảm giá");
                const campaign = await resCampaign.json();

                // Điền dữ liệu
                document.getElementById("campaign-id").value = campaign.id;
                document.getElementById("campaign-code").value = campaign.maDotGiamGia;
                document.getElementById("campaign-name").value = campaign.tenDotGiamGia;
                document.getElementById("campaign-discount-value").value = campaign.giaTriGiam || campaign.phanTramGiam || 0;
                document.getElementById("campaign-desc").value = campaign.moTa || "";
                
                const descCharEl = document.getElementById("desc-char-count");
                if (descCharEl) descCharEl.innerText = `${(campaign.moTa || "").length}/500`;

                // Format datetime-local
                document.getElementById("campaign-start-date").value = formatIsoLocalDateTime(campaign.ngayBatDau);
                document.getElementById("campaign-end-date").value = formatIsoLocalDateTime(campaign.ngayKetThuc);

                selectedProductDetailIds.clear();

                // Lấy danh sách sản phẩm chi tiết đã áp dụng
                const resProdIds = await fetch(`/api/dot-giam-gia/${id}/product-detail-ids`);
                if (resProdIds.ok) {
                    const ids = await resProdIds.json();
                    ids.forEach(pid => selectedProductDetailIds.add(pid));
                }

                const prodSelectedEl = document.getElementById("prod-selected-label");
                if (prodSelectedEl) prodSelectedEl.innerText = selectedProductDetailIds.size;

                document.getElementById("form-panel-title").innerText = `Cập nhật đợt giảm giá: ${campaign.maDotGiamGia}`;

                // Nạp bảng sản phẩm chi tiết
                prodCurrentPage = 0;
                loadProductDetailsTable();

                // Chuyển panel
                document.getElementById("list-panel").classList.remove("active");
                document.getElementById("form-panel").classList.add("active");

                window.scrollTo(0, 0);
                lucide.createIcons();

            } catch (err) {
                Swal.fire('Lỗi', 'Lỗi tải chi tiết: ' + err.message, 'error');
            }
        }

        // Format Date Array hoặc string từ server thành yyyy-MM-ddThh:mm
        function formatIsoLocalDateTime(dateArr) {
            if (!dateArr) return "";
            if (Array.isArray(dateArr)) {
                const yyyy = dateArr[0];
                const MM = String(dateArr[1]).padStart(2, '0');
                const dd = String(dateArr[2]).padStart(2, '0');
                const hh = String(dateArr[3] || 0).padStart(2, '0');
                const mm = String(dateArr[4] || 0).padStart(2, '0');
                return `${yyyy}-${MM}-${dd}T${hh}:${mm}`;
            }
            const date = new Date(dateArr);
            if (isNaN(date.getTime())) return dateArr;
            return formatDateTimeLocal(date);
        }

        function backToListPanel() {
            document.getElementById("form-panel").classList.remove("active");
            document.getElementById("list-panel").classList.add("active");
            loadCampaignsTable();
            window.scrollTo(0, 0);
        }

        // Lưu thông tin (Thêm mới / Cập nhật)
        async function saveCampaign(event) {
            event.preventDefault();

            const id = document.getElementById("campaign-id").value;
            const maDotGiamGia = document.getElementById("campaign-code").value.trim();
            const tenDotGiamGia = document.getElementById("campaign-name").value.trim();
            const hinhThucGiam = "%";
            const giaTriGiam = parseInt(document.getElementById("campaign-discount-value").value) || 0;
            const ngayBatDau = document.getElementById("campaign-start-date").value;
            const ngayKetThuc = document.getElementById("campaign-end-date").value;
            const moTa = document.getElementById("campaign-desc").value.trim();

            if (new Date(ngayBatDau) > new Date(ngayKetThuc)) {
                Swal.fire('Lỗi', 'Ngày bắt đầu phải diễn ra trước ngày kết thúc!', 'warning');
                return;
            }

            if (selectedProductDetailIds.size === 0) {
                Swal.fire('Lỗi', 'Bạn phải chọn ít nhất 1 sản phẩm chi tiết để áp dụng đợt giảm giá!', 'warning');
                return;
            }

            const payload = {
                maDotGiamGia,
                tenDotGiamGia,
                hinhThucGiam,
                giaTriGiam,
                ngayBatDau,
                ngayKetThuc,
                moTa,
                trangThai: 1, // kích hoạt mặc định
                productDetailIds: Array.from(selectedProductDetailIds)
            };

            const url = id ? `/api/dot-giam-gia/${id}` : "/api/dot-giam-gia";
            const method = id ? "PUT" : "POST";

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.message || "Lỗi lưu thông tin đợt giảm giá");
                }

                Swal.fire('Thành công', id ? "Cập nhật đợt giảm giá thành công!" : "Tạo đợt giảm giá thành công!", 'success');
                backToListPanel();
            } catch (err) {
                Swal.fire('Lỗi', "Thao tác thất bại: " + err.message, 'error');
            }
        }


        // =========================================================================
        // SECTION 3: XỬ LÝ CHỌN SẢN PHẨM CHI TIẾT (PRODUCT SELECTION)
        // =========================================================================

        async function loadProductDetailsTable() {
            const search = document.getElementById("prod-filter-search").value;

            let url = `/api/dot-giam-gia/san-pham-chi-tiet?page=${prodCurrentPage}&size=${prodPageSize}`;
            if (search) url += `&search=${encodeURIComponent(search)}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Không thể tải danh sách sản phẩm");
                const data = await response.json();
                renderProductDetailsTable(data);
            } catch (err) {
                console.error(err);
            }
        }

        function renderProductDetailsTable(pageData) {
            const tbody = document.getElementById("prod-table-body");
            tbody.innerHTML = "";

            const list = pageData.content || [];
            prodTotalPages = pageData.totalPages || 1;
            prodTotalElements = pageData.totalElements || 0;

            const totalCountEl = document.getElementById("prod-total-count");
            if (totalCountEl) {
                totalCountEl.innerText = `Tổng ${prodTotalElements} sản phẩm`;
            }

            if (list.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="3" style="text-align: center; color: #94a3b8; padding: 24px;">
                            Không tìm thấy sản phẩm nào hoạt động.
                        </td>
                    </tr>
                `;
                renderProdPagination();
                return;
            }

            displayedProductsOnPage = list;

            list.forEach((sp, index) => {
                const tr = document.createElement("tr");

                // Checkbox state (checked if this variant ID is in the set)
                const isChecked = selectedProductDetailIds.has(sp.id) ? "checked" : "";

                const checkboxTd = `
                    <td class="checkbox-cell" style="padding: 12px; text-align: center;">
                        <input type="checkbox" ${isChecked} onchange="toggleProductSelect(${index}, this.checked)">
                    </td>
                `;

                // Columns
                const maTd = `<td style="font-weight: 500; text-align: left; padding: 12px; color: #475569;">${sp.maSanPham || ''}</td>`;
                const tenTd = `<td style="font-weight: 500; color: #334155; text-align: left; padding: 12px;">${sp.tenSanPham || ''}</td>`;
                const mauTd = `<td style="text-align: left; padding: 12px;">${sp.tenMauSac || ''}</td>`;
                const sizeTd = `<td style="text-align: left; padding: 12px;">${sp.tenKichCo || ''}</td>`;
                const giaTd = `<td style="font-weight: 600; text-align: left; padding: 12px; color: #dc2626;">${formatCurrency(sp.giaBan)}</td>`;

                tr.innerHTML = checkboxTd + maTd + tenTd + mauTd + sizeTd + giaTd;
                tbody.appendChild(tr);
            });

            updateHeaderCheckboxState();
            renderProdPagination();
        }

        function toggleProductSelect(index, isChecked) {
            const sp = displayedProductsOnPage[index];
            if (!sp) return;

            if (isChecked) {
                selectedProductDetailIds.add(sp.id);
            } else {
                selectedProductDetailIds.delete(sp.id);
            }

            const selectedLabelEl = document.getElementById("prod-selected-label");
            if (selectedLabelEl) {
                selectedLabelEl.innerText = selectedProductDetailIds.size;
            }
            updateHeaderCheckboxState();
        }

        function updateHeaderCheckboxState() {
            const headerCheckbox = document.getElementById("check-all-products");
            if (!headerCheckbox) return;

            if (displayedProductsOnPage.length === 0) {
                headerCheckbox.checked = false;
                return;
            }

            const allChecked = displayedProductsOnPage.every(sp => selectedProductDetailIds.has(sp.id));
            headerCheckbox.checked = allChecked;
        }

        function toggleSelectAllPage(isChecked) {
            displayedProductsOnPage.forEach(sp => {
                if (isChecked) {
                    selectedProductDetailIds.add(sp.id);
                } else {
                    selectedProductDetailIds.delete(sp.id);
                }
            });

            const selectedLabelEl = document.getElementById("prod-selected-label");
            if (selectedLabelEl) {
                selectedLabelEl.innerText = selectedProductDetailIds.size;
            }

            renderProductDetailsTable({
                content: displayedProductsOnPage,
                totalPages: prodTotalPages,
                totalElements: prodTotalElements
            });
        }

        function selectAllCurrentPageProducts() {
            toggleSelectAllPage(true);
        }

        function renderProdPagination() {
            const nav = document.getElementById("prod-pagination");
            nav.innerHTML = "";

            const prev = document.createElement("button");
            prev.type = "button";
            prev.className = `page-btn ${prodCurrentPage === 0 ? 'disabled' : ''}`;
            prev.innerHTML = `<i data-lucide="chevron-left" style="width: 14px; height: 14px;"></i>`;
            prev.onclick = () => { if (prodCurrentPage > 0) { prodCurrentPage--; loadProductDetailsTable(); } };
            nav.appendChild(prev);

            for (let i = 0; i < prodTotalPages; i++) {
                const btn = document.createElement("button");
                btn.type = "button";
                btn.className = `page-btn ${i === prodCurrentPage ? 'active' : ''}`;
                btn.innerText = i + 1;
                btn.onclick = () => { prodCurrentPage = i; loadProductDetailsTable(); };
                nav.appendChild(btn);
            }

            const next = document.createElement("button");
            next.type = "button";
            next.className = `page-btn ${prodCurrentPage >= prodTotalPages - 1 ? 'disabled' : ''}`;
            next.innerHTML = `<i data-lucide="chevron-right" style="width: 14px; height: 14px;"></i>`;
            next.onclick = () => { if (prodCurrentPage < prodTotalPages - 1) { prodCurrentPage++; loadProductDetailsTable(); } };
            nav.appendChild(next);
            
            lucide.createIcons();
        }

        function changeProdPageSize(val) {
            prodPageSize = parseInt(val);
            prodCurrentPage = 0;
            loadProductDetailsTable();
        }

        function applyProdFilters() {
            prodCurrentPage = 0;
            loadProductDetailsTable();
        }
    </script>
