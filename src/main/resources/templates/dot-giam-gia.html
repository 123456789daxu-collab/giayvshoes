<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đợt giảm giá | VShoes</title>
    
    <!-- CSS Stylesheets -->
    <link rel="stylesheet" href="/css/sidebar.css">
    <link rel="stylesheet" href="/css/store.css">
    <link rel="stylesheet" href="/css/employee.css"> <!-- Reusing generic component classes -->
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; margin: 0; }
        .modal-body-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 600px) { .modal-body-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Nhúng Sidebar dùng chung -->
        <div th:replace="~{sidebar/sidebar :: sidebar}"></div>

        <!-- Nội dung chính -->
        <main class="main-content">
            <div class="content-card glass-card">
                <!-- Header -->
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px;">
                    <div>
                        <h1 class="content-title gradient-text" style="font-size: 28px; margin: 0 0 5px 0; font-weight: 800;">Quản lý Đợt Giảm Giá</h1>
                        <p class="content-desc" style="margin: 0; color: #64748b; font-weight: 500;">Quản lý các chương trình khuyến mãi, thiết lập thời gian và mức giảm giá chung.</p>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn-brown-icon" title="Tải lên"><i data-lucide="upload"></i></button>
                        <button class="btn-brown-icon" title="Tải xuống"><i data-lucide="download"></i></button>
                        <button class="btn-brown-icon" title="Xuất file"><i data-lucide="file-text"></i></button>
                        <button class="btn-brown-icon" id="btnAddDiscount" title="Thêm Đợt Giảm Giá"><i data-lucide="plus"></i></button>
                    </div>
                </div>

                <!-- Controls: Search & Filter Row -->
                <div class="controls-row">
                    <div class="search-wrapper">
                        <i data-lucide="search"></i>
                        <input type="text" id="searchInput" class="glass-input" placeholder="Tìm kiếm theo mã hoặc tên đợt giảm giá...">
                    </div>
                    <select id="filterStatus" class="glass-input filter-select">
                        <option value="">Tất cả trạng thái</option>
                        <option value="1">Đang diễn ra</option>
                        <option value="0">Đã kết thúc / Tạm dừng</option>
                    </select>
                </div>

                <!-- Table Container -->
                <div class="custom-table-container">
                    <table class="custom-table">
                        <thead>
                            <tr>
                                <th>Mã Đợt</th>
                                <th>Tên Chương Trình</th>
                                <th style="text-align: center;">Mức Giảm</th>
                                <th>Thời Gian Diễn Ra</th>
                                <th>Trạng Thái</th>
                                <th style="width: 180px; text-align: center;">Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="discountTableBody">
                            <!-- Dynamic rows loaded from JS -->
                        </tbody>
                    </table>
                </div>

                <!-- Pagination Container -->
                <div class="pagination-wrapper" id="paginationWrapper" style="display: none;">
                    <div class="pagination-info" id="paginationInfo" style="display: none;">Hiển thị...</div>
                    <div class="pagination-controls" id="paginationControls"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- ADD/EDIT MODAL -->
    <div class="modal-overlay" id="discountModal">
        <div class="modal-glass-content" style="max-width: 650px; width: 95%;">
            <span class="close" id="modalClose" style="position: absolute; top: 20px; right: 25px; cursor: pointer; font-size: 28px; color: #64748b; font-weight: 500;">&times;</span>
            <h2 id="modalTitle" class="gradient-text" style="font-size: 22px; margin-top: 0; margin-bottom: 25px; font-weight: 800;">Thêm Đợt Giảm Giá</h2>

            <form id="discountForm">
                <input type="hidden" id="discId">
                
                <div class="modal-body-grid">
                    <div>
                        <label style="font-size: 13px; font-weight: 700; color: #475569; display: block; margin-bottom: 8px;">Mã đợt giảm giá <span style="color: #ef4444;">*</span></label>
                        <input type="text" class="glass-input" id="discCode" placeholder="Ví dụ: BLACKFRIDAY" required style="width: 100%; box-sizing: border-box; text-transform: uppercase;"/>
                    </div>
                    <div>
                        <label style="font-size: 13px; font-weight: 700; color: #475569; display: block; margin-bottom: 8px;">Tên chương trình <span style="color: #ef4444;">*</span></label>
                        <input type="text" class="glass-input" id="discName" placeholder="Tên đợt giảm giá..." required style="width: 100%; box-sizing: border-box;"/>
                    </div>

                    <div>
                        <label style="font-size: 13px; font-weight: 700; color: #475569; display: block; margin-bottom: 8px;">Phần trăm giảm (%) <span style="color: #ef4444;">*</span></label>
                        <input type="number" class="glass-input" id="discPercent" placeholder="1-100" min="1" max="100" required style="width: 100%; box-sizing: border-box;"/>
                    </div>
                    <div>
                        <label style="font-size: 13px; font-weight: 700; color: #475569; display: block; margin-bottom: 8px;">Trạng thái</label>
                        <select class="glass-input" id="discStatus" style="width: 100%; box-sizing: border-box;">
                            <option value="1">Đang diễn ra</option>
                            <option value="0">Tạm dừng / Kết thúc</option>
                        </select>
                    </div>

                    <div>
                        <label style="font-size: 13px; font-weight: 700; color: #475569; display: block; margin-bottom: 8px;">Thời gian bắt đầu <span style="color: #ef4444;">*</span></label>
                        <input type="datetime-local" class="glass-input" id="discStart" required style="width: 100%; box-sizing: border-box;"/>
                    </div>
                    <div>
                        <label style="font-size: 13px; font-weight: 700; color: #475569; display: block; margin-bottom: 8px;">Thời gian kết thúc <span style="color: #ef4444;">*</span></label>
                        <input type="datetime-local" class="glass-input" id="discEnd" required style="width: 100%; box-sizing: border-box;"/>
                    </div>
                </div>

                <div style="margin-top: 20px;">
                    <label style="font-size: 13px; font-weight: 700; color: #475569; display: block; margin-bottom: 8px;">Mô tả chi tiết</label>
                    <textarea class="glass-input" id="discDesc" rows="3" placeholder="Nhập mô tả cho đợt giảm giá này..." style="width: 100%; resize: none; box-sizing: border-box;"></textarea>
                </div>

                <div style="margin-top: 30px; display: flex; justify-content: flex-end; gap: 10px;">
                    <button type="button" class="btn-premium-secondary" id="btnCancel">Hủy</button>
                    <button type="submit" class="btn-premium" style="min-width: 120px;">Lưu thông tin</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/js/discount.js" defer></script>
</body>
</html>
