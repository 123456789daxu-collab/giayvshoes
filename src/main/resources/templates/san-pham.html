<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm | VShoes</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/sidebar.css?v=2">
    <link rel="stylesheet" href="/css/khach-hang.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div th:replace="~{sidebar/sidebar :: sidebar}"></div>

        <!-- Nội dung chính -->
        <main class="main-content">
            <!-- Tiêu đề -->
            <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
                <h2 class="h4 mb-0 fw-bold text-dark" style="letter-spacing: -0.5px;">Quản lý sản phẩm</h2>
            </div>

            <!-- Card Bộ Lọc -->
            <div class="card bg-white border mb-4" style="border-radius: 8px; border-color: #e5e7eb !important;">
                <div class="card-header bg-white border-bottom-0 pt-4 pb-2">
                    <h6 class="fw-bold mb-0 text-dark" style="font-size: 0.95rem;"><i class="bi bi-funnel me-2"></i>Bộ lọc</h6>
                </div>
                <div class="card-body p-4 pt-2">
                    <form action="/san-pham" method="GET">
                        <div class="row mb-4 align-items-end">
                            <div class="col-md-6">
                                <label for="keyword" class="form-label fw-medium text-dark" style="font-size: 0.85rem;">Tìm kiếm</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white" style="border-color: #d1d5db; border-right: none;"><i class="bi bi-search text-muted"></i></span>
                                    <input type="text" name="keyword" id="keyword" class="form-control" placeholder="Tìm theo mã / tên sản phẩm..." th:value="${keyword}" style="border-color: #d1d5db; border-left: none; box-shadow: none;" onkeypress="if(event.keyCode==13) { this.form.submit(); return false; }">
                                </div>
                            </div>
                            <div class="col-md-6 text-end">
                                <a href="/san-pham" class="btn btn-outline-dark me-2" style="border-radius: 6px;"><i class="bi bi-arrow-clockwise me-1"></i> Đặt lại</a>
                                <button type="button" class="btn btn-outline-dark me-2" style="border-radius: 6px;" onclick="window.location.href='/san-pham/export'"><i class="bi bi-file-earmark-excel me-1"></i> Xuất Excel</button>
                                <a href="/san-pham/create" class="btn btn-dark" style="border-radius: 6px;"><i class="bi bi-plus-lg me-1"></i> Thêm sản phẩm</a>
                            </div>
                        </div>
                        <div class="row g-4">
                            <div class="col-md-4">
                                <label class="form-label fw-medium text-dark" style="font-size: 0.85rem;">Thương hiệu</label>
                                <select name="idThuongHieu" class="form-select" style="border-radius: 6px; border-color: #d1d5db;" onchange="this.form.submit()">
                                    <option value="">Tất cả thương hiệu</option>
                                    <option th:each="th : ${listThuongHieu}" th:value="${th.id}" th:text="${th.tenThuongHieu}" th:selected="${idThuongHieu == th.id}"></option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-medium text-dark" style="font-size: 0.85rem;">Loại giày</label>
                                <select name="idLoaiGiay" class="form-select" style="border-radius: 6px; border-color: #d1d5db;" onchange="this.form.submit()">
                                    <option value="">Tất cả loại giày</option>
                                    <option th:each="lg : ${listLoaiGiay}" th:value="${lg.id}" th:text="${lg.tenLoaiGiay}" th:selected="${idLoaiGiay == lg.id}"></option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-medium text-dark" style="font-size: 0.85rem;">Trạng thái</label>
                                <select name="trangThai" class="form-select" style="border-radius: 6px; border-color: #d1d5db;" onchange="this.form.submit()">
                                    <option value="">Tất cả trạng thái</option>
                                    <option value="1" th:selected="${trangThai == 1}">Kinh doanh</option>
                                    <option value="0" th:selected="${trangThai == 0}">Ngừng bán</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="d-none">Tìm kiếm</button>
                    </form>
                </div>
            </div>

            <!-- Card Danh Sách -->
            <div class="card bg-white border mb-4" style="border-radius: 8px; border-color: #e5e7eb !important;">
                <div class="card-header bg-white border-bottom-0 pt-4 pb-2">
                    <h6 class="fw-bold mb-0 text-dark" style="font-size: 0.95rem;"><i class="bi bi-box-seam me-2"></i>Danh sách sản phẩm</h6>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0" style="font-size: 0.9rem;">
                            <thead style="background-color: #f9fafb;">
                                <tr>
                                    <th class="text-center text-muted fw-semibold py-3" style="width: 60px; font-size: 0.85rem; border-bottom: 2px solid #e5e7eb; border-top: 1px solid #e5e7eb;">STT</th>
                                    <th class="text-muted fw-semibold py-3" style="font-size: 0.85rem; border-bottom: 2px solid #e5e7eb; border-top: 1px solid #e5e7eb;">Mã SP</th>
                                    <th class="text-muted fw-semibold py-3" style="font-size: 0.85rem; border-bottom: 2px solid #e5e7eb; border-top: 1px solid #e5e7eb;">Tên SP</th>
                                    <th class="text-muted fw-semibold py-3" style="font-size: 0.85rem; border-bottom: 2px solid #e5e7eb; border-top: 1px solid #e5e7eb;">Thương hiệu</th>
                                    <th class="text-center text-muted fw-semibold py-3" style="font-size: 0.85rem; border-bottom: 2px solid #e5e7eb; border-top: 1px solid #e5e7eb;">Số lượng</th>
                                    <th class="text-center text-muted fw-semibold py-3" style="font-size: 0.85rem; border-bottom: 2px solid #e5e7eb; border-top: 1px solid #e5e7eb;">Trạng thái</th>
                                    <th class="text-center text-muted fw-semibold py-3 text-nowrap" style="width: 120px; font-size: 0.85rem; border-bottom: 2px solid #e5e7eb; border-top: 1px solid #e5e7eb;">Hành động</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="sp, stat : ${pageData.content}">
                                    <td class="text-center align-middle py-3" th:text="${(pageData.number * pageData.size) + stat.index + 1}"></td>
                                    <td class="align-middle py-3" th:text="${sp.maSanPham}"></td>
                                    <td class="fw-medium text-dark align-middle py-3" th:text="${sp.tenSanPham}"></td>
                                    <td class="align-middle py-3" th:text="${sp.thuongHieu != null ? sp.thuongHieu.tenThuongHieu : ''}"></td>
                                    <td class="text-center align-middle py-3" th:text="${sp.soLuong}"></td>
                                    <td class="text-center align-middle py-3">
                                        <span th:if="${sp.trangThai == 1}" class="badge bg-success-subtle text-success px-3 py-2" style="border-radius: 6px; font-weight: 500;">Kinh doanh</span>
                                        <span th:unless="${sp.trangThai == 1}" class="badge bg-secondary-subtle text-secondary px-3 py-2" style="border-radius: 6px; font-weight: 500;">Ngừng bán</span>
                                    </td>
                                    <td class="text-center text-nowrap align-middle py-3">
                                        <a th:href="@{'/san-pham/edit/' + ${sp.id}}" class="btn btn-light text-primary me-2 px-3 py-2" style="border-radius: 6px; font-size: 1.1rem;" title="Xem chi tiết"><i class="bi bi-eye"></i></a>
                                        <a th:href="@{'/san-pham/delete/' + ${sp.id}}" class="btn btn-light text-danger px-3 py-2" style="border-radius: 6px; font-size: 1.1rem;" onclick="return confirm('Bạn có chắc muốn xóa?');" title="Xóa"><i class="bi bi-trash"></i></a>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(pageData.content)}">
                                    <td colspan="7" class="text-center text-muted py-5">
                                        <i class="bi bi-inbox fs-2 d-block mb-2 text-secondary"></i>
                                        Không tìm thấy dữ liệu
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Thanh phân trang -->
                <div class="d-flex justify-content-between align-items-center mt-4" th:if="${pageData.totalPages > 1}">
                    <div class="text-muted" style="font-size: 14px;">
                        Hiển thị <span th:text="${pageData.number * pageData.size + 1}" class="fw-medium text-dark"></span> 
                        đến <span th:text="${(pageData.number * pageData.size) + pageData.numberOfElements}" class="fw-medium text-dark"></span> 
                        trong tổng số <span th:text="${pageData.totalElements}" class="fw-medium text-dark"></span> mục
                    </div>
                    <nav>
                        <ul class="pagination pagination-sm mb-0" th:if="${pageData.totalPages > 0}"
    th:with="startPage=${pageData.number <= 1 ? 0 : (pageData.number >= pageData.totalPages - 2 ? pageData.totalPages - 3 : pageData.number - 1)},
             actualStartPage=${startPage < 0 ? 0 : startPage},
             endPage=${pageData.totalPages <= 3 ? pageData.totalPages - 1 : actualStartPage + 2}">
    <!-- Nút Trước -->
    <li class="page-item" th:classappend="${pageData.first ? 'disabled' : ''}">
        <a class="page-link" th:href="@{/san-pham(page=${pageData.number - 1}, size=${pageData.size}, keyword=${keyword}, trangThai=${trangThai}, soLuongTon=${soLuongTon}, idThuongHieu=${idThuongHieu}, idLoaiGiay=${idLoaiGiay})}">Trước</a>
    </li>
    <!-- Ellipsis Đầu -->
    <li class="page-item disabled" th:if="${actualStartPage > 0}">
        <a class="page-link" href="#">...</a>
    </li>
    <!-- Các số trang -->
    <li class="page-item" th:each="i : ${#numbers.sequence(actualStartPage, endPage)}" th:classappend="${pageData.number == i ? 'active' : ''}">
        <a class="page-link" th:href="@{/san-pham(page=${i}, size=${pageData.size}, keyword=${keyword}, trangThai=${trangThai}, soLuongTon=${soLuongTon}, idThuongHieu=${idThuongHieu}, idLoaiGiay=${idLoaiGiay})}" th:text="${i + 1}"></a>
    </li>
    <!-- Ellipsis Cuối -->
    <li class="page-item disabled" th:if="${endPage < pageData.totalPages - 1}">
        <a class="page-link" href="#">...</a>
    </li>
    <!-- Nút Sau -->
    <li class="page-item" th:classappend="${pageData.last ? 'disabled' : ''}">
        <a class="page-link" th:href="@{/san-pham(page=${pageData.number + 1}, size=${pageData.size}, keyword=${keyword}, trangThai=${trangThai}, soLuongTon=${soLuongTon}, idThuongHieu=${idThuongHieu}, idLoaiGiay=${idLoaiGiay})}">Sau</a>
    </li>
</ul>
                    </nav>
                </div>
            </div>

        </main>
    </div>

    <!-- Modal Tạo Sản Phẩm -->
    <div class="modal fade" id="addModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <form action="/san-pham/add" method="POST" enctype="multipart/form-data">
                    <div class="modal-header border-0 pb-0 text-center d-block position-relative mt-3">
                        <h4 class="modal-title fw-bold text-uppercase w-100" style="letter-spacing: 1px;">THÊM SẢN PHẨM</h4>
                        <button type="button" class="btn-close position-absolute" style="top: 0; right: 20px;" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body px-5 py-4">
                        
                        <div class="mb-4 d-flex align-items-center">
                            <label class="form-label fw-bold mb-0 me-3 text-nowrap" style="width: 120px;"><span class="text-danger">*</span> Tên sản phẩm:</label>
                            <input type="text" class="form-control" name="tenSanPham" placeholder="Nhập tên sản phẩm" required style="border-radius: 6px;">
                        </div>
                        
                        <div class="mb-4 d-flex align-items-start">
                            <label class="form-label fw-bold mb-0 me-3 text-nowrap mt-2" style="width: 120px;"><span class="text-danger">*</span> Mô tả:</label>
                            <textarea class="form-control" name="moTaChiTiet" rows="4" placeholder="Nhập mô tả sản phẩm" style="border-radius: 6px;"></textarea>
                        </div>

                        <div class="row g-4 mt-2">
                            <!-- Cột trái -->
                            <div class="col-md-6">
                                <div class="d-flex align-items-center mb-4">
                                    <label class="form-label fw-bold mb-0 me-3 text-nowrap" style="width: 100px;"><span class="text-danger">*</span> Thương hiệu:</label>
                                    <div class="input-group">
                                        <select class="form-select" name="thuongHieu.id" required style="border-radius: 6px 0 0 6px;">
                                            <option value="">Chọn thương hiệu</option>
                                            <option th:each="th : ${listThuongHieu}" th:value="${th.id}" th:text="${th.tenThuongHieu}"></option>
                                        </select>
                                        <button class="btn btn-primary px-3" type="button" style="border-radius: 0 6px 6px 0;"><i class="bi bi-plus-lg"></i></button>
                                    </div>
                                </div>
                                <div class="d-flex align-items-center mb-4">
                                    <label class="form-label fw-bold mb-0 me-3 text-nowrap" style="width: 100px;"><span class="text-danger">*</span> Chất Liệu:</label>
                                    <div class="input-group">
                                        <select class="form-select" name="chatLieu.id" required style="border-radius: 6px 0 0 6px;">
                                            <option value="">Chọn chất liệu</option>
                                            <option th:each="cl : ${listChatLieu}" th:value="${cl.id}" th:text="${cl.tenChatLieu}"></option>
                                        </select>
                                        <button class="btn btn-primary px-3" type="button" style="border-radius: 0 6px 6px 0;"><i class="bi bi-plus-lg"></i></button>
                                    </div>
                                </div>
                                <div class="d-flex align-items-center mb-4">
                                    <label class="form-label fw-bold mb-0 me-3 text-nowrap" style="width: 100px;"><span class="text-danger">*</span> Màu sắc:</label>
                                    <div class="input-group">
                                        <select class="form-select" name="idMauSac" required style="border-radius: 6px 0 0 6px;">
                                            <option value="">Chọn màu sắc</option>
                                            <option th:each="ms : ${listMauSac}" th:value="${ms.id}" th:text="${ms.tenMauSac}"></option>
                                        </select>
                                        <button class="btn btn-primary px-3" type="button" style="border-radius: 0 6px 6px 0;"><i class="bi bi-plus-lg"></i></button>
                                    </div>
                                </div>
                                <div class="d-flex align-items-center mb-4">
                                    <label class="form-label fw-bold mb-0 me-3 text-nowrap" style="width: 100px;"><span class="text-danger">*</span> Kích cỡ:</label>
                                    <div class="input-group">
                                        <select class="form-select" name="idCoGiay" required style="border-radius: 6px 0 0 6px;">
                                            <option value="">Chọn kích cỡ</option>
                                            <option th:each="cg : ${listCoGiay}" th:value="${cg.id}" th:text="${cg.sizeGiay}"></option>
                                        </select>
                                        <button class="btn btn-primary px-3" type="button" style="border-radius: 0 6px 6px 0;"><i class="bi bi-plus-lg"></i></button>
                                    </div>
                                </div>
                                <div class="d-flex align-items-center mb-4">
                                    <label class="form-label fw-bold mb-0 me-3 text-nowrap" style="width: 100px;"><span class="text-danger">*</span> Ảnh SP:</label>
                                    <input class="form-control" type="file" name="imageFile" accept="image/*" style="border-radius: 6px;" required>
                                </div>
                            </div>
                            <!-- Cột phải -->
                            <div class="col-md-6">
                                <div class="d-flex align-items-center mb-4">
                                    <label class="form-label fw-bold mb-0 me-3 text-nowrap" style="width: 100px;"><span class="text-danger">*</span> Trạng thái:</label>
                                    <div class="input-group">
                                        <select class="form-select" name="trangThai" style="border-radius: 6px 0 0 6px;">
                                            <option value="1">Kinh Doanh</option>
                                            <option value="0">Ngừng kinh doanh</option>
                                        </select>
                                        <button class="btn btn-primary px-3" type="button" style="border-radius: 0 6px 6px 0;"><i class="bi bi-plus-lg"></i></button>
                                    </div>
                                </div>
                                <div class="d-flex align-items-center mb-4">
                                    <label class="form-label fw-bold mb-0 me-3 text-nowrap" style="width: 100px;"><span class="text-danger">*</span> Loại Giày:</label>
                                    <div class="input-group">
                                        <select class="form-select" name="loaiGiay.id" required style="border-radius: 6px 0 0 6px;">
                                            <option value="">Chọn loại giày</option>
                                            <option th:each="lg : ${listLoaiGiay}" th:value="${lg.id}" th:text="${lg.tenLoaiGiay}"></option>
                                        </select>
                                        <button class="btn btn-primary px-3" type="button" style="border-radius: 0 6px 6px 0;"><i class="bi bi-plus-lg"></i></button>
                                    </div>
                                </div>
                                <div class="d-flex align-items-center mb-4">
                                    <label class="form-label fw-bold mb-0 me-3 text-nowrap" style="width: 100px;"><span class="text-danger">*</span> Danh mục:</label>
                                    <div class="input-group">
                                        <select class="form-select" name="danhMuc.id" required style="border-radius: 6px 0 0 6px;">
                                            <option value="">Chọn danh mục</option>
                                            <option th:each="dm : ${listDanhMuc}" th:value="${dm.id}" th:text="${dm.tenDanhMuc}"></option>
                                        </select>
                                        <button class="btn btn-primary px-3" type="button" style="border-radius: 0 6px 6px 0;"><i class="bi bi-plus-lg"></i></button>
                                    </div>
                                </div>
                                <div class="d-flex align-items-center mb-4">
                                    <label class="form-label fw-bold mb-0 me-3 text-nowrap" style="width: 100px;"><span class="text-danger">*</span> Giá bán:</label>
                                    <div class="input-group">
                                        <input type="number" class="form-control" name="giaBan" placeholder="0" min="0" required style="border-radius: 6px 0 0 6px;">
                                        <span class="input-group-text" style="border-radius: 0 6px 6px 0;">VNĐ</span>
                                    </div>
                                </div>
                                <div class="d-flex align-items-center mb-4">
                                    <label class="form-label fw-bold mb-0 me-3 text-nowrap" style="width: 100px;"><span class="text-danger">*</span> Số lượng:</label>
                                    <input type="number" class="form-control" name="soLuongTon" placeholder="0" min="1" required style="border-radius: 6px;">
                                </div>
                            </div>
                        </div>
                        
                        <!-- Mã Sản Phẩm ẩn (tự sinh) -->
                        <input type="hidden" name="maSanPham" value="">
                    </div>
                    <div class="modal-footer border-0 px-5 pb-4 d-flex justify-content-center">
                        <button type="button" class="btn btn-secondary px-4 me-2" data-bs-dismiss="modal" style="border-radius: 6px;">Hủy</button>
                        <button type="submit" class="btn btn-primary px-4" style="border-radius: 6px; background-color: #2563EB;">Tạo mới</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- SweetAlert2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script th:inline="javascript">
        /*<![CDATA[*/
        var successMsg = /*[[${successMessage}]]*/ null;
        var errorMsg = /*[[${errorMessage}]]*/ null;
        /*]]>*/
        
        document.addEventListener("DOMContentLoaded", function() {
            if (successMsg) {
                Swal.fire({
                    toast: true,
                    position: 'top-end',
                    icon: 'success',
                    title: successMsg,
                    showConfirmButton: false,
                    timer: 3000,
                    timerProgressBar: true
                });
            }
            if (errorMsg) {
                Swal.fire({
                    toast: true,
                    position: 'top-end',
                    icon: 'error',
                    title: errorMsg,
                    showConfirmButton: false,
                    timer: 3000,
                    timerProgressBar: true
                });
            }
        });
    </script>
</body>
</html>
